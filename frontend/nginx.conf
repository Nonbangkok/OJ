server {
  listen 80;
  client_max_body_size 2G; # Add this line to allow larger file uploads

  proxy_connect_timeout 300s;
  proxy_send_timeout 300s;
  proxy_read_timeout 300s;

  # --- Security headers (defense-in-depth) ---
  # Defined at server level so they apply to every location below (none of the
  # location blocks define their own add_header, so these are inherited).
  #
  # CSP notes:
  #   - default-src 'self'              : only same-origin by default.
  #   - object-src 'self' / frame-src 'self' : same-origin problem PDFs are
  #     embedded in an <iframe> / <object>.
  #   - style-src 'self' 'unsafe-inline' : React injects inline styles, so
  #     'unsafe-inline' is required for styles. Scripts stay 'self' only.
  #   - img-src 'self' data:            : allow inline data: images.
  #   - frame-ancestors 'none'          : clickjacking protection.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'self'; frame-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

  # Set the root directory for static files
  root /usr/share/nginx/html;

  # This is the default location block.
  location / {
    # First attempt to serve request as file, then
    # as directory, then fall back to displaying a 404.
    try_files $uri $uri/ /index.html;
  }

  # Proxy API requests to the backend service
  location /api/ {
    # The backend service is reachable at the name 'backend' on port 3000
    # because they are in the same Docker network.
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
} 