services:
  database:
    image: postgres:16-alpine
    container_name: oj_database
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - oj-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oj_backend
    depends_on:
      - database
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      - PORT=3000
      - SECRET_KEY=${SECRET_KEY}
      - PGHOST=database
      - PGPORT=5432
      - PGUSER=${POSTGRES_USER}
      - PGDATABASE=${POSTGRES_DB}
      - PGPASSWORD=${POSTGRES_PASSWORD}
    networks:
      - oj-network
    restart: unless-stopped
    # --- A2: sandbox hardening for the code-execution container ---
    # This container compiles and runs untrusted, user-submitted C++. Limit the
    # blast radius if a submission escapes the in-process sandbox (time_wrapper
    # setrlimit + privilege drop).
    security_opt:
      # Prevent any process (incl. setuid binaries) from gaining new privileges.
      - "no-new-privileges:true"
    cap_drop:
      # Drop ALL Linux capabilities; the judge needs none of them. The wrapper
      # only needs to setuid/setgid DOWN to nobody, which does not require a
      # capability when starting from root within the container's user namespace.
      - "ALL"
    # Cap total processes/threads to contain fork bombs at the cgroup level even
    # if a submission slips past RLIMIT_NPROC.
    pids_limit: 256
    # Bound memory so a runaway compile/submission cannot OOM the host.
    # mem_reservation is the soft target; mem_limit is the hard ceiling.
    mem_reservation: 512m
    mem_limit: 1g
    # NOTE: a stronger isolation (separate judge container with
    # network_mode: none and no DB secrets) is described in SANDBOX.md.

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL}
        - REACT_APP_LARGE_UPLOAD_API_URL=${REACT_APP_LARGE_UPLOAD_API_URL}
    container_name: oj_frontend
    depends_on:
      - backend
    networks:
      - oj-network
    restart: unless-stopped

  nginx-proxy:
    image: nginx:1.25-alpine
    container_name: oj_proxy
    depends_on:
      - frontend
    ports:
      - "80:80"
      - "443:443" # For future SSL
    volumes:
      - ./nginx-proxy:/etc/nginx/conf.d
      - ./certbot-www:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/lib/letsencrypt:/var/lib/letsencrypt
    networks:
      - oj-network
    restart: unless-stopped

networks:
  oj-network:
    driver: bridge

volumes:
  db-data:
    driver: local 
