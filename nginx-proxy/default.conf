# ---------------------------------------------------------------------------
# Security headers (defense-in-depth)
#
# These are defined once here and pulled into each server block with
# `include`-style duplication. nginx's `add_header` does NOT inherit into a
# block that defines its own add_header directives, so the full set is repeated
# in every server block below.
#
# CSP notes:
#   - default-src 'self'            : only same-origin by default.
#   - object-src 'self'             : the app embeds same-origin problem PDFs.
#   - frame-src 'self'              : PDFs are shown in a same-origin <iframe>.
#   - style-src 'self' 'unsafe-inline' : CRA / React inject inline styles, so
#     'unsafe-inline' is required for styling to work. Scripts are NOT given
#     'unsafe-inline'; they stay 'self' only.
#   - img-src 'self' data:          : allow inline data: images (icons, etc.).
#   - frame-ancestors 'none'        : clickjacking protection (mirrors
#     X-Frame-Options: DENY for CSP-aware browsers).
# Adjust if the app needs additional origins (e.g. a CDN or analytics host).
# ---------------------------------------------------------------------------

server {
    listen 80;
    server_name woi-grader.com www.woi-grader.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://woi-grader.com$request_uri;
    }
}

server {
    listen 80;
    server_name upload.woi-grader.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://upload.woi-grader.com$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name woi-grader.com www.woi-grader.com;

    ssl_certificate /etc/letsencrypt/live/woi-grader.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/woi-grader.com/privkey.pem;

    client_max_body_size 2G;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # --- Security headers (HTTPS) ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'self'; frame-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    location / {
        proxy_pass http://frontend:80;
    }

    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://backend:3000/;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name upload.woi-grader.com;

    ssl_certificate /etc/letsencrypt/live/woi-grader.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/woi-grader.com/privkey.pem;

    client_max_body_size 2G;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # --- Security headers (HTTPS) ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'self'; frame-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://backend:3000/;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
    }

    location / {
        return 404;
    }
}
