server {
    listen 80;
    server_name woi-grader.com www.woi-grader.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://woi-grader.com$request_uri;
    }
}

server {
    listen 80;
    server_name upload.woi-grader.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://upload.woi-grader.com$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name woi-grader.com www.woi-grader.com;

    ssl_certificate /etc/letsencrypt/live/woi-grader.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/woi-grader.com/privkey.pem;

    client_max_body_size 2G;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://frontend:80;
    }

    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://backend:3000/;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name upload.woi-grader.com;

    ssl_certificate /etc/letsencrypt/live/woi-grader.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/woi-grader.com/privkey.pem;

    client_max_body_size 2G;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://backend:3000/;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
    }

    location / {
        return 404;
    }
}
